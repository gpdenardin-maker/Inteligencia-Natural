<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Inteligência Natural</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="wrapper">

  <h1>Inicie sua conversa</h1>
  <p class="sub">
    Inteligência Natural — conexões humanas sobre projetos
  </p>

  <div class="input-group">
    <input id="nome" placeholder="Seu nome">
  </div>

  <div class="input-group">
    <input id="area" placeholder="Área de atuação">
  </div>

  <div class="input-group">
    <input id="interesse" placeholder="Sobre o que quer conversar?">
  </div>

  <div class="checkbox">
    <input type="checkbox" id="lgpd">
    <label>Aceito o uso dos dados para organização do fórum</label>
  </div>

  <button onclick="enviarDados()">Iniciar conversa →</button>

  <div class="footer">
    Fórum de Gestão de Projetos
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
